name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install C compiler (CGO for sqlite3)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - run: go vet ./...

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CGO_ENABLED: "1" # mattn/go-sqlite3 (cursor provider + telemetry store)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install C compiler (CGO for sqlite3)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      # macOS ships clang; the windows-latest image ships mingw-w64 gcc on PATH.

      - name: Run tests
        shell: bash # pwsh mangles `-coverprofile=coverage.out` into a `.out` package arg
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out

  build:
    # Pin the per-matrix display name so the required status-check context
    # stays "Build (<os>)" and does not leak the `bin` matrix axis
    # (otherwise it becomes "Build (ubuntu-latest, openusage)" and branch
    # protection never sees the context it requires).
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: openusage
          - os: macos-latest
            bin: openusage
          - os: windows-latest
            bin: openusage.exe
    env:
      CGO_ENABLED: "1" # mattn/go-sqlite3 (cursor provider + telemetry store)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install C compiler (CGO for sqlite3)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      # macOS ships clang; the windows-latest image ships mingw-w64 gcc on PATH.

      - name: Build binary
        shell: bash
        run: go build -ldflags="-s -w" -o ${{ matrix.bin }} ./cmd/openusage

      - name: Verify binary
        shell: bash
        run: ls -la ${{ matrix.bin }}

  fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

  tidy:
    name: Check go.mod tidiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify module checksums
        run: go mod verify

  icon-font:
    name: Icon font up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify committed icon font matches its sources
        run: |
          python -m pip install --quiet 'fonttools==4.63.0'
          python scripts/gen-icon-font.py
          git diff --exit-code internal/tmux/assets/openusage-icons.ttf \
            || (echo "::error::committed icon font is stale; run 'make icon-font' and commit the result" && exit 1)
